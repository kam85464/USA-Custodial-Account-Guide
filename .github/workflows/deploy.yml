name: Deploy Jekyll site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Last Modified Data
        run: |
          mkdir -p _data
          # Generates a JSON map of filename: unix_timestamp
          python3 -c "import json, subprocess; files = [f for f in subprocess.check_output(['git', 'ls-files']).decode().splitlines() if f.endswith('.md')]; data = {f: subprocess.check_output(['git', 'log', '-1', '--format=%ct', f]).decode().strip() for f in files}; print(json.dumps(data))" > _data/last_modified.json
      - name: Link Checker
        uses: lycheeverse/lychee-action@v2.1.0
        with:
          args: --verbose --no-progress --base . './README.md' './docs/**/*.md'
          fail: true
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
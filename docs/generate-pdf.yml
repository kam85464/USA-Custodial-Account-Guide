name: Generate Guide PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  convert_via_pandoc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create build directory
        run: mkdir -p build

      - name: Combine Markdown files
        run: |
          cat README.md docs/overview.md docs/ugma-vs-utma.md docs/custodial-vs-529.md docs/india-strategy.md docs/tax-considerations.md docs/dual-status-worksheet.md docs/investment-portfolio.md docs/year-end-checklist.md docs/maintenance-checklist.md docs/letter-of-authorization.md docs/departure-document-checklist.md docs/successor-custodian-letter.md docs/successor-letter-of-intent.md docs/letter-of-instruction.md docs/apostille-process-india.md docs/faq.md > build/combined.md

      - name: Render PDF
        uses: baileyjm02/markdown-to-pdf@v1
        with:
          input_path: build/combined.md
          output_path: build/Custodial_Account_Guide.pdf
          build_html: false

      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Custodial-Account-Guide-PDF
          path: build/Custodial_Account_Guide.pdf

      - name: Create Release and Upload PDF
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: latest
          name: Latest International Custodial Guide PDF
          body: |
            Automated build of the Custodial Account Guide.
          files: build/Custodial_Account_Guide.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}